services:
  - type: web
    name: akazuba-backend
    env: node
    plan: starter
    branch: main
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: akazuba-database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://akazubaflorist.com
      - key: FRONTEND_URL
        value: https://akazubaflorist.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: FLUTTERWAVE_PUBLIC_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: MOMO_API_KEY
        sync: false
      - key: MOMO_API_SECRET
        sync: false
      - key: REDIS_URL
        sync: false

databases:
  - name: akazuba-database
    databaseName: akazuba_florist
    user: akazuba_user
    plan: starter
