services:
  # Backend API Service
  - type: web
    name: akazuba-backend-api
    env: node
    plan: starter
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: akazuba-database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://akazubaflorist.com
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: LOG_LEVEL
        value: info
      - key: LOG_FORMAT
        value: json
      - key: PAYMENT_METHOD
        value: local_upload
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
      - key: MAX_FILE_SIZE
        value: 10485760

  # PostgreSQL Database
  - type: pserv
    name: akazuba-database
    env: postgresql
    plan: starter
    ipAllowList: []
    maxConnections: 97
    sharedBuffers: 128MB
    effectiveCacheSize: 384MB
    maintenanceWindow: sunday:00:00-04:00
    pgVersion: "15"

databases:
  - name: akazuba-database
    databaseName: akazuba_production
    user: akazuba_user
